services:
  rlimit:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: "8080"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POLICY_FILE: policy/policies.yaml
      SQLITE_DB_PATH: rlimit.db
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
